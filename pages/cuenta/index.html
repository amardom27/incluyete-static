<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="../../assets/css/components.css">
    <link rel="stylesheet" href="../../assets/css/layout.css">
    <link rel="stylesheet" href="../../assets/css/utilities.css">
    <link rel="stylesheet" href="../../assets/css/pages/cuenta.css">
</head>

<body>
    <main class="auth-page">
        <section class="auth-card auth-card--register">
            <a href="../../index.html" class="auth-brand">
                <div class="logo-cont">
                    <img class="rounded" src="../../assets/images/oficial.webp" alt="Logo">
                </div>
            </a>

            <div class="auth-content">
                <h1>Bienvenido</h1>
                <p class="auth-text">
                    Introduzca sus credenciales para acceder a su cuenta
                </p>

                <form action="" method="post" class="auth-form">
                    <div class="input-style">
                        <label for="nombre">Nombre</label>
                        <input type="text" name="nombre" id="nombre" placeholder="Paco Pepe" required>
                        <span>* Campo obligatorio</span>
                    </div>

                    <div class="input-style">
                        <label for="email">Email</label>
                        <input type="email" name="email" id="email" placeholder="ejemplo@email.com" required>
                        <span>* Campo obligatorio</span>
                    </div>

                    <div class="input-style">
                        <label for="clave">Contraseña</label>
                        <input type="password" name="clave" id="clave" placeholder="****" required>
                        <span>* Campo obligatorio</span>
                    </div>

                    <div class="input-style">
                        <label for="repetida">Repetir Contraseña</label>
                        <input type="password" name="repetida" id="repetida" placeholder="****" required>
                        <span>* Campo obligatorio</span>
                    </div>

                    <div class="checkbox-style">
                        <input type="checkbox" name="recordar" id="recordar" required>
                        <label class="cursor-pointer" for="recordar">Acepto los Términos y Condiciones</label>
                    </div>

                    <button type="submit" class="btn-style-2 transition">Entrar</button>

                    <p class="auth-switch">
                        ¿Ya tienes una cuenta?
                        <a href="../login/index.html" class="link-style-2 transition">Iniciar Sesión</a>
                    </p>
                </form>
            </div>
        </section>
    </main>
</body>

</html>
